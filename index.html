<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KrystalStudios</title>
    <meta name="description"
        content="Premium Discord bots, Minecraft plugins, websites, and more. Led by @lab18bke.">
    <link rel="icon" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <nav class="nav">
            <div class="nav-container">
                <a href="#" class="nav-logo">
                    <img src="logo.png" alt="KrystalStudios" class="logo-img">
                </a>
                <div class="nav-links">
                    <a href="https://discord.gg/krystal" class="nav-cta" target="_blank">
                        <i class="fab fa-discord"></i>
                        <span>Discord</span>
                    </a>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <section class="hero-section">
                <p class="hero-tag">@lab18bke</p>
                <h1 class="hero-title">Premium development.<br><span class="accent">Without premium prices.</span></h1>


                <a href="https://discord.gg/J3FmkPyhuA" class="cta-btn" target="_blank">
                    <i class="fab fa-discord"></i>
                    <span>Start a Project</span>
                </a>
            </section>

            <section class="services-section">
                <h2 class="section-title">What We Do</h2>
                <div class="services-grid">
                    <div class="service-card">Discord Bots</div>
                    <div class="service-card">Web Development</div>
                    <div class="service-card">Minecraft Plugins</div>
                    <div class="service-card">Mods & Datapacks</div>
                </div>
            </section>

            <section class="trust-strip">
                <div class="trust-item">
                    <i class="fas fa-check"></i>
                    <span>Premium Development.</span>
                </div>
                <div class="trust-item">
                    <i class="fas fa-check"></i>
                    <span>Affordable Prices.</span>
                </div>
                <div class="trust-item">
                    <i class="fas fa-check"></i>
                    <span>Working with Deadline.</span>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="footer-content">
                <span class="footer-brand">KrystalStudios</span>
                <span class="footer-divider">·</span>
                <span class="footer-year">2026</span>
                <span class="footer-divider">·</span>
                <a href="https://discord.gg/J3FmkPyhuA" class="footer-discord" target="_blank">
                    <i class="fab fa-discord"></i>
                </a>
            </div>
            <button class="terminal-toggle" id="terminalToggle" aria-label="Open Terminal">
                <i class="fas fa-terminal"></i>
            </button>
        </footer>
    </div>

    <div class="terminal-overlay" id="terminalOverlay">
        <div class="terminal-container">
            <div class="terminal-header">
                <div class="terminal-title">
                    <i class="fas fa-terminal"></i>
                    <span>KrystalTerminal</span>
                </div>
                <button class="terminal-close" id="terminalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="terminal-body" id="terminalBody">
                <div class="terminal-welcome">
                    <p>KrystalStudios Terminal v1.0</p>
                </div>
                <div class="terminal-output" id="terminalOutput"></div>
            </div>
            <div class="terminal-input-container">
                <span class="terminal-prompt">$</span>
                <input type="text" class="terminal-input" id="terminalInput" placeholder="Enter command..."
                    autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
